<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clip_stacker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>clip_stacker</h1>
        <p>Upload, trim, reorder, fade, and merge clips into one MP4.</p>
      </header>

      <section class="panel">
        <div class="toolbar">
          <label class="button-like">
            Add clips (MP4 / WAV / MP3)
            <input id="clipInput" type="file" accept="video/mp4,audio/wav,audio/x-wav,audio/mpeg,.mp4,.wav,.mp3" multiple />
          </label>
          <button id="mergeButton" type="button">Render merged video</button>
          <button id="saveProjectButton" type="button">Save project</button>
          <button id="loadProjectButton" type="button">Load project</button>
          <input id="projectFileInput" type="file" accept="application/json" hidden />
        </div>
        <div class="storage-row">
          <label>
            Contabo storage endpoint
            <input id="storageEndpoint" type="url" placeholder="https://.../contabo_storage_manager/projects" />
          </label>
          <label>
            Auth token (optional)
            <input id="storageAuthToken" type="password" placeholder="Bearer token or API key" />
          </label>
          <label>
            Project name
            <input id="projectName" type="text" value="default-project" />
          </label>
          <button id="saveRemoteButton" type="button">Save remote</button>
          <button id="loadRemoteButton" type="button">Load remote</button>
        </div>
        <p id="status" aria-live="polite"></p>
      </section>

      <section class="layout-grid">
        <section class="panel">
          <h2>Library</h2>
          <ul id="clipList" class="clip-list"></ul>
        </section>

        <section class="panel">
          <h2>Inspector</h2>
          <div id="emptyInspector" class="muted">Select a clip to edit trim and fades.</div>
          <div id="clipInspector" hidden>
            <label>
              Clip title
              <input id="clipName" type="text" />
            </label>
            <label>
              Trim start (s)
              <input id="trimStart" type="number" min="0" step="0.1" />
            </label>
            <label>
              Trim end (s, optional)
              <input id="trimEnd" type="number" min="0" step="0.1" />
            </label>
            <label>
              Video fade in (s)
              <input id="videoFadeIn" type="number" min="0" step="0.1" />
            </label>
            <label>
              Video fade out (s)
              <input id="videoFadeOut" type="number" min="0" step="0.1" />
            </label>
            <label>
              Audio fade in (s)
              <input id="audioFadeIn" type="number" min="0" step="0.1" />
            </label>
            <label>
              Audio fade out (s)
              <input id="audioFadeOut" type="number" min="0" step="0.1" />
            </label>
          </div>
        </section>

        <section class="panel">
          <h2>Preview</h2>
          <video id="videoPreview" controls hidden></video>
          <audio id="audioPreview" controls hidden></audio>
          <div id="noPreview" class="muted">No clip selected.</div>
          <a id="downloadLink" hidden download="stacked.mp4">Download merged MP4</a>
        </section>
      </section>

      <section class="panel">
        <h2>Timeline</h2>
        <p class="muted">Clips stay in project when adding new uploads; newest upload is auto-selected.</p>
        <ol id="timeline" class="timeline"></ol>
      </section>
    </main>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
