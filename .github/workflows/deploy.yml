name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target site
        required: false
        default: test
        type: choice
        options:
          - test
          - go

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip fork PRs and runs without the deploy token configured.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Deploy to Contabo
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'test' }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "::error::DEPLOY_TOKEN secret is not configured — cannot deploy to test.1ink.us."
            exit 1
          fi
          python3 deploy.py
