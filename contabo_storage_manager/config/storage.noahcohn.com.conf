server {
    listen 80;
    listen [::]:80;
    server_name storage.noahcohn.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name storage.noahcohn.com;

    # SSL configuration (managed by Certbot or similar)
    ssl_certificate     /etc/letsencrypt/live/storage.noahcohn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storage.noahcohn.com/privkey.pem;

    # Proxy to local FastAPI application
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type,Authorization' always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type,Authorization' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location /webhook/ {
        proxy_pass http://127.0.0.1:8000/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type,Authorization' always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type,Authorization' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
