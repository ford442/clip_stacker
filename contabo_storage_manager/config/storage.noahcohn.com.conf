server {
    listen 80;
    listen [::]:80;
    server_name storage.noahcohn.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name storage.noahcohn.com;

    # SSL configuration (managed by Certbot or similar)
    ssl_certificate     /etc/letsencrypt/live/storage.noahcohn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storage.noahcohn.com/privkey.pem;

    # Chunked uploads send ~5 MiB bodies; keep headroom under the 10 MiB client threshold.
    client_max_body_size 10m;

    # Slow / mobile links: allow long-running chunk PUTs without proxy 504s.
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Proxy to local FastAPI application
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for COEP-isolated clip_stacker fetches of API JSON.
        add_header Cross-Origin-Resource-Policy cross-origin always;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type,Authorization,Content-Range,Content-Length' always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type,Authorization,Content-Range,Content-Length' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location /webhook/ {
        proxy_pass http://127.0.0.1:8000/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for COEP-isolated clip_stacker fetches (#146).
        add_header Cross-Origin-Resource-Policy cross-origin always;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type,Authorization,Content-Range,Content-Length' always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type,Authorization,Content-Range,Content-Length' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow cross-origin fetches of media files under COEP (require-corp).
        # cross-origin is used because clip_stacker is served from a different origin.
        add_header Cross-Origin-Resource-Policy cross-origin always;
    }
}
